name: "Security & Standards"

on:
  schedule:
    - cron: '0 0 * * 0'
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master", "develop", "development" ]

jobs:
  prepare:
    name: Prepare CI matrix
    runs-on: ubuntu-latest
    outputs:
      php_versions: ${{ steps.matrix.outputs.php_versions }}
      dependency_versions: ${{ steps.matrix.outputs.dependency_versions }}
    steps:
      - name: Define shared matrix values
        id: matrix
        run: |
          echo 'php_versions=["8.4","8.5"]' >> "$GITHUB_OUTPUT"
          echo 'dependency_versions=["prefer-lowest","prefer-stable"]' >> "$GITHUB_OUTPUT"

  run:
    needs: prepare
    runs-on: ${{ matrix.operating-system }}
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      memcached:
        image: memcached:1.6-alpine
        ports:
          - 11211:11211
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: cachelayer
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d cachelayer"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    strategy:
      matrix:
        operating-system: [ ubuntu-latest ]
        php-versions: ${{ fromJson(needs.prepare.outputs.php_versions) }}
        dependency-version: ${{ fromJson(needs.prepare.outputs.dependency_versions) }}

    name: Code Analysis - PHP ${{ matrix.php-versions }} - ${{ matrix.dependency-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          tools: composer:v2
          extensions: mbstring, redis, memcached, apcu, pdo_pgsql, pdo_sqlite, sqlite3, sysvshm
          ini-values: apc.enable_cli=1, apcu.enable_cli=1
          coverage: xdebug

      - name: Check PHP Version
        run: php -v

      - name: Verify cache-driver extensions
        run: |
          php -r "foreach (['apcu','redis','memcached','pdo_pgsql','pdo_sqlite','sqlite3','sysvshm'] as \$ext) { if (!extension_loaded(\$ext)) { fwrite(STDERR, \"Missing extension: {\$ext}\" . PHP_EOL); exit(1); } }"
          php -r "if (!apcu_enabled()) { fwrite(STDERR, 'APCu is not enabled for CLI' . PHP_EOL); exit(1); } if (!function_exists('shm_attach')) { fwrite(STDERR, 'shm_attach() is unavailable' . PHP_EOL); exit(1); }"

      - name: Wait for cache services
        env:
          CACHELAYER_PG_DSN: pgsql:host=127.0.0.1;port=5432;dbname=cachelayer
          CACHELAYER_PG_USER: postgres
          CACHELAYER_PG_PASS: postgres
        run: |
          for i in {1..30}; do
            php -r '$r = new Redis(); try { if ($r->connect("127.0.0.1", 6379, 0.5)) { $pong = $r->ping(); if ($pong === true || stripos((string) $pong, "pong") !== false) { exit(0); } } } catch (Throwable) {} exit(1);' && break
            sleep 1
            if [ "$i" -eq 30 ]; then echo "Redis service not ready"; exit 1; fi
          done

          for i in {1..30}; do
            php -r '$m = new Memcached(); $m->addServer("127.0.0.1", 11211); $m->set("ci_probe", "ok", 5); exit($m->getResultCode() === Memcached::RES_SUCCESS ? 0 : 1);' && break
            sleep 1
            if [ "$i" -eq 30 ]; then echo "Memcached service not ready"; exit 1; fi
          done

          for i in {1..30}; do
            php -r '$dsn = getenv("CACHELAYER_PG_DSN"); $user = getenv("CACHELAYER_PG_USER"); $pass = getenv("CACHELAYER_PG_PASS"); try { $pdo = new PDO($dsn, $user, $pass); $pdo->query("SELECT 1"); exit(0); } catch (Throwable) { exit(1); }' && break
            sleep 1
            if [ "$i" -eq 30 ]; then echo "PostgreSQL service not ready"; exit 1; fi
          done

      - name: Validate Composer
        run: composer validate --strict

      - name: Resolve dependencies (${{ matrix.dependency-version }})
        run: composer update --no-interaction --prefer-dist --no-progress --${{ matrix.dependency-version }}

      - name: Test
        env:
          CACHELAYER_PG_DSN: pgsql:host=127.0.0.1;port=5432;dbname=cachelayer
          CACHELAYER_PG_USER: postgres
          CACHELAYER_PG_PASS: postgres
        run: |
          composer test:syntax
          composer test:code
          composer test:lint
          composer test:sniff
          composer test:refactor
          if [ "${{ matrix.dependency-version }}" != "prefer-lowest" ]; then
            composer test:static
          fi
          if [ "${{ matrix.dependency-version }}" != "prefer-lowest" ]; then
            composer test:security
          fi

  analyze:
    needs: prepare
    name: Security Analysis - PHP ${{ matrix.php-versions }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-versions: ${{ fromJson(needs.prepare.outputs.php_versions) }}
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          tools: composer:v2
          extensions: mbstring, redis, memcached, apcu, pdo_pgsql, pdo_sqlite, sqlite3, sysvshm
          ini-values: apc.enable_cli=1, apcu.enable_cli=1

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Composer Audit (Release Guard)
        run: composer release:audit

      - name: Quality Gate (PHPStan)
        run: composer test:static

      - name: Security Gate (Psalm)
        run: composer test:security

      - name: Run PHPStan (Code Scanning)
        run: |
          php ./vendor/bin/phpstan analyse --configuration=phpstan.neon.dist --memory-limit=1G --no-progress --error-format=json > phpstan-results.json || true
          php .github/scripts/phpstan-sarif.php phpstan-results.json phpstan-results.sarif
        continue-on-error: true

      - name: Upload PHPStan Results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: phpstan-results.sarif
          category: "phpstan-${{ matrix.php-versions }}"
        if: always() && hashFiles('phpstan-results.sarif') != ''

      # Run Psalm (Deep Taint Analysis)
      - name: Run Psalm Security Scan
        run: |
          php ./vendor/bin/psalm --config=psalm.xml --security-analysis --threads=1 --report=psalm-results.sarif || true
        continue-on-error: true

      - name: Upload Psalm Results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: psalm-results.sarif
          category: "psalm-${{ matrix.php-versions }}"
        if: always() && hashFiles('psalm-results.sarif') != ''
